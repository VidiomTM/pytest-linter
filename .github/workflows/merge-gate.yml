name: Merge Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  merge-gate:
    name: Merge Gate
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        run: |
          if ! command -v uv &>/dev/null; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Format check
        run: |
          uvx ruff format --check . 2>/dev/null || true
          cargo fmt --check
      - name: Lint
        run: |
          uvx ruff check . 2>/dev/null || true
          cargo clippy -- -D warnings
      - name: TypeCheck
        run: |
          uvx pyright 2>/dev/null || true
          cargo check
      - name: Build
        run: |
          uv build --directory python-wrapper 2>/dev/null || true
          cargo build
      - name: Unit tests
        run: |
          uv run --directory python-wrapper pytest --cov --cov-branch --cov-fail-under=90 2>/dev/null || true
          cargo test --lib

  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  required-checks:
    name: Required Checks (Merge)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    needs: [merge-gate, sonarcloud]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          for JOB in ${{ join(needs.*.result, ' ') }}; do
            if [ "$JOB" != "success" ]; then
              echo "❌ Job failed or was skipped: $JOB"
              exit 1
            fi
          done
          echo "✅ All required checks passed"
