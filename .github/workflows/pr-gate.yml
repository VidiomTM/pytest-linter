name: Required Checks (PR)

on:
  pull_request:
    branches: [main, master]
  merge_group:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - name: Check required files exist
        run: |
          for f in Cargo.toml README.md LICENSE; do
            if [ ! -f "$f" ]; then echo "Missing: $f"; exit 1; fi
          done

  rust-quality:
    name: Rust Quality
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup stable Rust toolchain
        run: |
          source "$HOME/.cargo/env" 2>/dev/null || true
          rustup default stable
          rustup component add rustfmt clippy
      - run: cargo +stable fmt --all -- --check
      - run: cargo +stable clippy --workspace --all-targets -- -D warnings
      - run: cargo +stable test --workspace

  dependency-scan:
    name: Dependency Scan
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: brew install cargo-deny
      - name: Run cargo-deny
        run: cargo deny check

  secret-scanning:
    name: Secret Scanning
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_darwin_arm64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --verbose --no-banner

  structure:
    name: Repository Structure
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build structurelint
        run: |
          git clone --depth 1 https://github.com/Jonathangadeaharder/structurelint.git "$RUNNER_TEMP/structurelint-src"
          cd "$RUNNER_TEMP/structurelint-src" && go build -o "$RUNNER_TEMP/structurelint" ./cmd/structurelint
          chmod +x "$RUNNER_TEMP/structurelint"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Run structurelint
        run: structurelint .
      - name: Cleanup structurelint build
        if: always()
        run: rm -rf "$RUNNER_TEMP/structurelint" "$RUNNER_TEMP/structurelint-src"

  required-checks:
    name: Required Checks (PR)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    needs: [repo-hygiene, rust-quality, dependency-scan, secret-scanning, structure]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          for JOB in ${{ join(needs.*.result, ' ') }}; do
            if [ "$JOB" != "success" ]; then
              echo "❌ Job failed or was skipped: $JOB"
              exit 1
            fi
          done
          echo "✅ All required checks passed"
