name: Mutation Testing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main, master]
    paths:
      - 'src/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'

permissions:
  contents: read

jobs:
  mutants:
    name: Mutation Testing
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Run cargo-mutants (PR — diff only)
        if: github.event_name == 'pull_request'
        run: |
          git diff origin/${{ github.base_ref }}.. | tee git.diff
          cargo mutants --no-shuffle --in-diff git.diff --timeout 30
      - name: Run cargo-mutants (full — nightly / main)
        if: github.event_name != 'pull_request'
        run: cargo mutants --in-place --timeout 30
      - name: Archive mutants.out
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutants-out
          path: mutants.out
