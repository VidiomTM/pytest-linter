name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ["self-hosted", "rust", "macos"]
            artifact_name: pytest-linter
            asset_name: pytest-linter-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ["self-hosted", "rust", "macos"]
            artifact_name: pytest-linter
            asset_name: pytest-linter-aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: ["self-hosted", "rust", "macos"]
            artifact_name: pytest-linter
            asset_name: pytest-linter-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: ["self-hosted", "rust", "macos"]
            artifact_name: pytest-linter
            asset_name: pytest-linter-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: pytest-linter.exe
            asset_name: pytest-linter-x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          cd staging
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          cd staging
          Compress-Archive -Path "${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.asset_name }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset_name }}.zip").Hash
          "$hash  ${{ matrix.asset_name }}.zip" | Out-File -Encoding ascii "${{ matrix.asset_name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            staging/*.tar.gz
            staging/*.zip
            staging/*.sha256

  build-python-wrapper:
    name: Build PyPI package
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update wrapper version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" python-wrapper/pytest_linter_wrapper/__init__.py
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" python-wrapper/pyproject.toml

      - name: Build package
        run: |
          pip install build
          cd python-wrapper
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: python-wrapper/dist/

  release:
    name: Create GitHub Release
    needs: [build-binaries, build-python-wrapper]
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign artifacts with Sigstore
        run: |
          cd artifacts
          for f in *.tar.gz *.zip; do
            if [ -f "$f" ]; then
              cosign sign-blob --yes "$f" --output-signature "$f.sig" --output-certificate "$f.pem"
            fi
          done

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "artifacts/*.tar.gz, artifacts/*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ["self-hosted", "rust", "macos"]
    environment:
      name: pypi
      url: https://pypi.org/project/pytest-linter/
    permissions:
      id-token: write
    steps:
      - name: Download PyPI artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
