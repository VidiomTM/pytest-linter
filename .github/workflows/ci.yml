name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check pytest-linter
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy pytest-linter
        run: cargo +nightly clippy --lib -- -W clippy::all -W clippy::pedantic -W clippy::nursery

  test:
    name: Test
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test pytest-linter
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage pytest-linter + Cobertura XML
        run: |
          mkdir -p coverage
          cargo +nightly llvm-cov --cobertura --output-path coverage/cobertura.xml --fail-under-lines 90

      - name: Upload Cobertura coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
          retention-days: 7

      - name: Install sonar-scanner
        run: |
          if ! command -v sonar-scanner &>/dev/null; then
            brew install sonar-scanner
          fi
      - name: SonarCloud scan
        if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'Jonathangadeaharder_pytest-linter' }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || 'jonathangadeaharder' }} \
            -Dsonar.rust.cobertura.reportPaths=coverage/cobertura.xml \
            -Dsonar.host.url=https://sonarcloud.io

  bench:
    name: Benchmarks
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks (smoke — single iteration)
        run: cargo bench -- --test

  audit:
    name: Audit
    runs-on: ["self-hosted", "security", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Audit dependencies
        run: cargo audit

  dogfood:
    name: Dogfood
    needs: test
    runs-on: ["self-hosted", "rust", "macos"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Create pytest test file with smells
        run: |
          cat > /tmp/test_smell.py << 'PYEOF'
          import time
          import requests

          def test_bad():
              time.sleep(5)
              with open("data.txt") as f:
                  content = f.read()
              assert True
          PYEOF
      - name: Run pytest-linter on smell file
        run: |
          ./target/release/pytest-linter --format json /tmp/test_smell.py > /tmp/pytest-result.json
          violations=$(python3 -c "import json,sys; print(len(json.load(sys.stdin)))" < /tmp/pytest-result.json)
          echo "pytest-linter found $violations violations"
          [ "$violations" -gt 0 ]
